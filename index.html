<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scott Adams Adventures</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#00ff41;font-family:'Courier New',Courier,monospace;height:100vh;display:flex;flex-direction:column}
#header{background:#16213e;padding:10px 20px;border-bottom:2px solid #0f3460;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#header h1{font-size:18px;color:#e94560;white-space:nowrap}
select,button{background:#0f3460;color:#00ff41;border:1px solid #00ff41;padding:5px 10px;font-family:inherit;font-size:13px;cursor:pointer;border-radius:3px}
button:hover{background:#1a4a8a}
#game-area{flex:1;display:flex;flex-direction:column;padding:10px 20px;overflow:hidden}
#output{flex:1;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;font-size:15px;line-height:1.4;padding-bottom:2px;scrollbar-width:thin;scrollbar-color:#0f3460 #1a1a2e}
#output::-webkit-scrollbar{width:8px}
#output::-webkit-scrollbar-track{background:#1a1a2e}
#output::-webkit-scrollbar-thumb{background:#0f3460}
/* room images and inline map are created dynamically inside #output */
.treasure{color:#ffd700}
.llm-enhanced{color:#c8a85a;font-style:italic;border-left:2px solid rgba(200,168,90,0.2);padding-left:8px;margin-top:4px;font-size:14px}
.llm-translated{color:#666;font-size:12px;margin-top:2px}
#llm-toggle{transition:border-color 0.3s,color 0.3s}
#llm-toggle.active{border-color:#c8a85a;color:#c8a85a}
#llm-toggle.loading{border-color:#ffc46e;color:#ffc46e;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#llm-progress{height:3px;background:#333;margin-top:4px;display:none;border-radius:2px;overflow:hidden;width:200px}
#llm-progress-bar{height:100%;background:#6eb5ff;width:0%;transition:width 0.3s}
#llm-model{font-size:12px}
#input-row{display:flex;align-items:center;border-top:1px solid #0f3460;padding-top:8px;margin-top:4px}
#prompt{color:#e94560;margin-right:8px;font-size:15px}
#cmd{flex:1;background:transparent;border:none;outline:none;color:#00ff41;font-family:inherit;font-size:15px;caret-color:#00ff41}
#help-bar{background:#16213e;color:#555;font-size:11px;padding:4px 20px;border-top:1px solid #0f3460}
/* Map is rendered inline inside #output */
</style>
</head>
<body>
<div id="header">
  <div><h1 style="margin:0">SCOTT ADAMS ADVENTURES</h1><div style="font-size:11px;color:#aaa;margin-top:2px">Brought back to life in HTML/JavaScript with graphics by Jonathan M. Rothberg</div></div>
  <select id="game-select">
    <option value="adv01.dat">1 - Adventureland</option>

    <option value="adv06.dat">6 - Strange Odyssey</option>

    <option value="adv08.dat">8 - Pyramid of Doom</option>
    <option value="adv09.dat">9 - Ghost Town</option>

</div>

  <div id="output"></div>
  <div id="input-row">
    <span id="prompt">What shall I do? &gt;</span>

  </div>
</div>
<div id="help-bar">
  N/S/E/W/U/D=move | I=inventory | L=look | GET/DROP item | SAVE/LOAD/QUIT | MAP=show map | HINT=get help | Classic/LLM toggle for natural language
</div>

<!-- Map is now rendered inline in the output area -->

<script>
'use strict';

/* ===== TOKENIZER ===== */
function tokenize(text) {
  const t = [], len = text.length;
  let i = 0;
  while (i < len) {
    while (i < len && (text[i] === ' ' || text[i] === '\t' || text[i] === '\n' || text[i] === '\r')) i++;
    if (i >= len) break;
    if (text[i] === '"') {
      i++;
      let s = '';
      while (i < len && text[i] !== '"') { s += text[i]; i++; }
      if (i < len) i++;
      t.push(s);
    } else if ((text[i] >= '0' && text[i] <= '9') || text[i] === '-') {
      let n = '';
      if (text[i] === '-') { n = '-'; i++; }
      while (i < len && text[i] >= '0' && text[i] <= '9') { n += text[i]; i++; }
      t.push(parseInt(n, 10));
    } else { i++; }
  }
  return t;
}

/* ===== PARSER ===== */
function parseGameData(text) {
  const tok = tokenize(text);
  let p = 0;
  const ni = () => tok[p++];
  const ns = () => tok[p++];

  const h = {
    id: ni(), numItems: ni(), numActions: ni(), numWords: ni(),
    numRooms: ni(), maxCarry: ni(), startRoom: ni(), numTreasures: ni(),
    wordLen: ni(), lightTime: ni(), numMessages: ni(), treasureRoom: ni()
  };

  const actions = [];
  for (let a = 0; a <= h.numActions; a++)
    actions.push({ vocab: ni(), cond: [ni(),ni(),ni(),ni(),ni()], act: [ni(),ni()] });

  const verbs = [], nouns = [];
  for (let w = 0; w <= h.numWords; w++) { verbs.push(ns()); nouns.push(ns()); }

  const rooms = [];
  for (let r = 0; r <= h.numRooms; r++)
    rooms.push({ exits: [ni(),ni(),ni(),ni(),ni(),ni()], desc: ns() });

  const messages = [];
  for (let m = 0; m <= h.numMessages; m++) messages.push(ns());

  const items = [];
  for (let it = 0; it <= h.numItems; it++) {
    const desc = ns(), loc = ni();
    let autoGet = '';
    const m = desc.match(/\/([^\/]+)\/\s*$/);
    if (m) autoGet = m[1];
    items.push({ desc, loc, startLoc: loc, autoGet });
  }

  // skip action comments + trailer
  for (let c = 0; c <= h.numActions; c++) ns();
  const version = ni(), advNum = ni();

  return { h, actions, verbs, nouns, rooms, messages, items, version, advNum };
}

/* ===== ENGINE ===== */
class Engine {
  constructor(g) {
    this.g = g;
    this.h = g.h;
    this.loc = this.h.startRoom;
    this.iLoc = g.items.map(it => it.loc);
    this.flags = new Array(32).fill(false);
    this.counters = new Array(16).fill(0);
    this.savedRooms = new Array(16).fill(0);
    this.curCtr = 0;
    this.lightTime = this.h.lightTime;
    this.dead = false;
    this.deathReason = ''; // Set when the game ends so the next turn can explain why (see case 62, SCORE win, QUIT).
    this._lastFatalityContext = ''; // Last message printed from an action in the current runActions() pass (for case 62).
    this.redraw = true;
    this.lastNoun = '';
    this.buf = '';
    this.roomNum = this.loc;
  }

  out(s) { this.buf += s; }
  flush() { const b = this.buf; this.buf = ''; return b; }

  findWord(w, list) {
    if (!w) return 0;
    const wl = this.h.wordLen;
    const s = w.substring(0, wl).toUpperCase();
    let grp = -1;
    for (let i = 0; i < list.length; i++) {
      let e = list[i];
      if (e.startsWith('*')) e = e.substring(1); else grp = i;
      if (e.substring(0, wl).toUpperCase() === s) return grp;
    }
    return -1;
  }

  isLit() {
    if (!this.flags[15]) return true;
    return this.iLoc[9] === -1 || this.iLoc[9] === this.loc;
  }

  carried() { let c = 0; for (const l of this.iLoc) if (l === -1) c++; return c; }

  look() {
    this.roomNum = this.loc;
    if (this.flags[15] && !this.isLit()) {
      this.out("I can't see. It is too dark!\n");
      return;
    }
    const room = this.g.rooms[this.loc];
    if (!room) return;
    let d = room.desc;
    if (d.startsWith('*')) this.out(d.substring(1) + '\n');
    else if (d) this.out("I'm in a " + d + '\n');

    const here = [];
    for (let i = 0; i < this.iLoc.length; i++) {
      if (this.iLoc[i] === this.loc) {
        let s = this.g.items[i].desc.replace(/\/[^\/]*\/\s*$/, '').trim();
        if (s) here.push(s);
      }
    }
    if (here.length) this.out("\nI can also see: " + here.join(" - ") + '\n');

    const dirs = ['North','South','East','West','Up','Down'];
    const ex = [];
    for (let d = 0; d < 6; d++) if (room.exits[d]) ex.push(dirs[d]);
    this.out("\nObvious exits: " + (ex.length ? ex.join(', ') : 'None') + '\n\n');
  }

  chkCond(code, val) {
    switch(code) {
      case 0: return true;
      case 1: return this.iLoc[val] === -1;
      case 2: return this.iLoc[val] === this.loc;
      case 3: return this.iLoc[val] === -1 || this.iLoc[val] === this.loc;
      case 4: return this.loc === val;
      case 5: return this.iLoc[val] !== this.loc;
      case 6: return this.iLoc[val] !== -1;
      case 7: return this.loc !== val;
      case 8: return !!this.flags[val];
      case 9: return !this.flags[val];
      case 10: return this.carried() > 0;
      case 11: return this.carried() === 0;
      case 12: return this.iLoc[val] !== -1 && this.iLoc[val] !== this.loc;
      case 13: return this.iLoc[val] !== 0;
      case 14: return this.iLoc[val] === 0;
      case 15: return this.counters[this.curCtr] <= val;
      case 16: return this.counters[this.curCtr] > val;
      case 17: return this.iLoc[val] === this.g.items[val].startLoc;
      case 18: return this.iLoc[val] !== this.g.items[val].startLoc;
      case 19: return this.counters[this.curCtr] === val;
      default: return true;
    }
  }

  exec(cmd, par, pi) {
    switch(cmd) {
      case 52: { // auto GET
        const nw = this.lastNoun.substring(0, this.h.wordLen).toUpperCase();
        let f = -1;
        for (let i = 0; i < this.g.items.length; i++) {
          const ag = this.g.items[i].autoGet;
          if (ag && ag.substring(0, this.h.wordLen).toUpperCase() === nw && this.iLoc[i] === this.loc) { f = i; break; }
        }
        if (f < 0) this.out("I don't see it here.\n");
        else if (this.carried() >= this.h.maxCarry) this.out("I've too much to carry!\n");
        else { this.iLoc[f] = -1; this.out("OK\n"); }
        return pi;
      }
      case 53: { // auto DROP
        const nw = this.lastNoun.substring(0, this.h.wordLen).toUpperCase();
        let f = -1;
        for (let i = 0; i < this.g.items.length; i++) {
          const ag = this.g.items[i].autoGet;
          if (ag && ag.substring(0, this.h.wordLen).toUpperCase() === nw && this.iLoc[i] === -1) { f = i; break; }
        }
        if (f < 0) this.out("I'm not carrying it.\n");
        else { this.iLoc[f] = this.loc; this.out("OK\n"); }
        return pi;
      }
      case 54: this.loc = par[pi++]; this.redraw = true; return pi;
      case 55: this.iLoc[par[pi++]] = 0; return pi;
      case 56: this.flags[15] = true; return pi;
      case 57: this.flags[15] = false; return pi;
      case 58: this.flags[par[pi++]] = true; return pi;
      case 59: this.flags[par[pi++]] = false; return pi;
      case 60: // die
        this.out("I'm dead...\n");
        this._lastFatalityContext = (this._lastFatalityContext ? this._lastFatalityContext + ' — ' : '') + "I'm dead...";
        this.loc = this.g.rooms.length - 1;
        this.flags[15] = false;
        this.redraw = true;
        return pi;
      case 61: { const it = par[pi++], rm = par[pi++]; this.iLoc[it] = rm; return pi; }
      case 62: { // game over flag (often chained after a message or case 60 in the same action)
        this.dead = true;
        if (this._lastFatalityContext)
          this.deathReason = this._lastFatalityContext;
        else {
          const lines = this.buf.replace(/\r/g, '').trim().split(/\n/).map(l => l.trim()).filter(Boolean);
          const chunk = lines.slice(-4).join(' ');
          this.deathReason = chunk.length > 320 ? chunk.slice(-320) : chunk;
          if (!this.deathReason)
            this.deathReason = 'A fatal event in the story data ended the game; the last few engine lines above are the only hint.';
        }
        this._lastFatalityContext = '';
        return pi;
      }
      case 63: this.look(); return pi;
      case 64: { // score
        let sc = 0;
        for (let i = 0; i < this.g.items.length; i++)
          if (this.g.items[i].desc.includes('*') && this.iLoc[i] === this.h.treasureRoom) sc++;
        this.out("I've stored " + sc + " treasures. On a scale of 0 to 100, that rates " +
          Math.floor(sc * 100 / this.h.numTreasures) + ".\n");
        if (sc === this.h.numTreasures) {
          this.out("Well done!\n");
          this.dead = true;
          this.deathReason = 'You stored all treasures and won.';
        }
        return pi;
      }
      case 65: { // inventory
        const c = [];
        for (let i = 0; i < this.iLoc.length; i++)
          if (this.iLoc[i] === -1) c.push(this.g.items[i].desc.replace(/\/[^\/]*\/\s*$/, '').trim());
        this.out("I'm carrying: " + (c.length ? c.join(", ") : "Nothing!") + '\n');
        return pi;
      }
      case 66: this.flags[0] = true; return pi;
      case 67: this.flags[0] = false; return pi;
      case 68: this.lightTime = this.h.lightTime; return pi;
      case 69: return pi;
      case 70: this.doSave(); return pi;
      case 71: { const a = par[pi++], b = par[pi++]; const t = this.iLoc[a]; this.iLoc[a] = this.iLoc[b]; this.iLoc[b] = t; return pi; }
      case 72: return pi; // continue handled in loop
      case 73: this.iLoc[par[pi++]] = -1; return pi;
      case 74: { const a = par[pi++], b = par[pi++]; this.iLoc[a] = this.iLoc[b]; return pi; }
      case 75: this.look(); return pi;
      case 76: this.counters[this.curCtr]--; return pi;
      case 77: this.out(String(this.counters[this.curCtr])); return pi;
      case 78: this.counters[this.curCtr] = par[pi++]; return pi;
      case 79: { const t = this.loc; this.loc = this.savedRooms[this.curCtr]; this.savedRooms[this.curCtr] = t; this.redraw = true; return pi; }
      case 80: this.curCtr = par[pi++]; return pi;
      case 81: this.counters[this.curCtr] += par[pi++]; return pi;
      case 82: this.counters[this.curCtr] -= par[pi++]; return pi;
      case 83: this.out(this.lastNoun); return pi;
      case 84: this.out(this.lastNoun + '\n'); return pi;
      case 85: this.out('\n'); return pi;
      case 86: { const sl = par[pi++]; const t = this.loc; this.loc = this.savedRooms[sl]; this.savedRooms[sl] = t; this.redraw = true; return pi; }
      default: return pi;
    }
  }

  runActions(verb, noun) {
    this._lastFatalityContext = '';
    let matched = false, cont = false;
    for (let i = 0; i < this.g.actions.length; i++) {
      const a = this.g.actions[i];
      const av = Math.floor(a.vocab / 150), an = a.vocab % 150;

      if (verb === 0) {
        if (av !== 0) { cont = false; continue; }
        if (!cont) { if (an > 0 && Math.random() * 100 >= an) continue; }
      } else {
        if (av === 0) continue;
        if (av !== verb) continue;
        if (an !== 0 && an !== noun) continue;
      }

      let ok = true;
      const par = [];
      for (let c = 0; c < 5; c++) {
        const code = a.cond[c] % 20, val = Math.floor(a.cond[c] / 20);
        if (code === 0) par.push(val);
        else if (!this.chkCond(code, val)) { ok = false; break; }
      }

      cont = false;
      if (!ok) continue;
      matched = true;

      const subs = [Math.floor(a.act[0]/150), a.act[0]%150, Math.floor(a.act[1]/150), a.act[1]%150];
      let pi = 0, hasCont = false;
      for (const s of subs) {
        if (s === 0) continue;
        if (s >= 1 && s <= 51) {
          const line = this.g.messages[s] + '\n';
          this._lastFatalityContext = line.trim();
          this.out(line);
        } else if (s >= 102) {
          const line = this.g.messages[s - 50] + '\n';
          this._lastFatalityContext = line.trim();
          this.out(line);
        }
        else if (s === 72) hasCont = true;
        else pi = this.exec(s, par, pi);
      }
      if (hasCont) cont = true;
      else if (verb !== 0) break;
    }
    return matched;
  }

  doGo(dir) {
    if (this.flags[15] && !this.isLit()) {
      if (Math.random() < 0.25) {
        this.out("I fell down and broke my neck.\n");
        this.loc = this.g.rooms.length - 1;
        this.flags[15] = false;
        this.redraw = true;
        return;
      }
      this.out("Dangerous to move in the dark!\n");
    }
    const room = this.g.rooms[this.loc];
    if (room.exits[dir]) { this.loc = room.exits[dir]; this.redraw = true; }
    else this.out("I can't go in that direction.\n");
  }

  doGet(nw) {
    if (!nw) { this.out("What?\n"); return; }
    const s = nw.substring(0, this.h.wordLen).toUpperCase();
    for (let i = 0; i < this.g.items.length; i++) {
      const ag = this.g.items[i].autoGet;
      if (!ag || ag.substring(0, this.h.wordLen).toUpperCase() !== s) continue;
      if (this.iLoc[i] === this.loc) {
        if (this.carried() >= this.h.maxCarry) this.out("I've too much to carry!\n");
        else { this.iLoc[i] = -1; this.out("OK\n"); }
        return;
      }
      if (this.iLoc[i] === -1) { this.out("I already have it.\n"); return; }
    }
    this.out("I don't see it here.\n");
  }

  doDrop(nw) {
    if (!nw) { this.out("What?\n"); return; }
    const s = nw.substring(0, this.h.wordLen).toUpperCase();
    for (let i = 0; i < this.g.items.length; i++) {
      const ag = this.g.items[i].autoGet;
      if (!ag || ag.substring(0, this.h.wordLen).toUpperCase() !== s) continue;
      if (this.iLoc[i] === -1) { this.iLoc[i] = this.loc; this.out("OK\n"); return; }
    }
    this.out("I'm not carrying it.\n");
  }

  doSave() {
    const key = 'sa_' + (this.g.advNum || 0);
    const state = { loc: this.loc, iLoc: [...this.iLoc], flags: [...this.flags],
      counters: [...this.counters], savedRooms: [...this.savedRooms],
      curCtr: this.curCtr, lightTime: this.lightTime };
    try { localStorage.setItem(key, JSON.stringify(state)); this.out("Game saved.\n"); }
    catch(e) { this.out("Save failed.\n"); }
  }

  doLoad() {
    const key = 'sa_' + (this.g.advNum || 0);
    try {
      const d = localStorage.getItem(key);
      if (!d) { this.out("No saved game.\n"); return; }
      const s = JSON.parse(d);
      this.loc = s.loc; this.iLoc = s.iLoc; this.flags = s.flags;
      this.counters = s.counters; this.savedRooms = s.savedRooms;
      this.curCtr = s.curCtr; this.lightTime = s.lightTime;
      this.dead = false; this.deathReason = ''; this.redraw = true;
      this.out("Game restored.\n");
    } catch(e) { this.out("Load failed.\n"); }
  }

  expand(input) {
    let t = input.trim();
    // LLM may output a single line like [INVENTORY] — strip so findWord sees INV / one token
    const bracketed = t.match(/^\[([^\]]+)\]\s*$/);
    if (bracketed) t = bracketed[1].trim();
    let u = t.toUpperCase().replace(/\?+$/, '').trim();
    // Multi-word English → same commands as N/S/E (game verbs match first wordLen letters, e.g. INV)
    if (/^WHAT\s+AM\s+I\s+CARRYING/.test(u) || /^WHAT\s+DO\s+I\s+HAVE/.test(u) ||
        u === 'INVENTORY' || u === 'ITEMS' || /^SHOW\s+INVENTORY/.test(u) ||
        /^LIST\s+(MY\s+)?(ITEMS|STUFF)$/.test(u)) {
      u = 'I';
    }
    if (/^WHAT'?S\s+MY\s+SCORE$/.test(u) || /^WHAT\s+IS\s+THE\s+SCORE$/.test(u) ||
        /^WHATS\s+THE\s+SCORE/.test(u) || /^HOW\s+AM\s+I\s+DOING$/.test(u) ||
        /^HOW\s+MANY\s+TREASURES/.test(u)) {
      u = 'SCORE';
    }
    const m = {N:'GO NORTH',S:'GO SOUTH',E:'GO EAST',W:'GO WEST',U:'GO UP',D:'GO DOWN',I:'INVENTORY',L:'LOOK'};
    if (m[u]) return m[u];
    if (u === 'SCORE') return 'SCORE';
    return t;
  }

  turn(input) {
    this.buf = '';

    if (this.dead) {
      this.out("Game over. Click 'New Game' to restart.\n");
      if (this.deathReason) this.out('Why you ended: ' + this.deathReason + '\n');
      return this.flush();
    }

    // Light handling
    if (this.iLoc[9] === -1 || this.iLoc[9] === this.loc) {
      if (this.lightTime > 0) {
        this.lightTime--;
        if (this.lightTime < 1) {
          this.flags[16] = true;
          this.out("Light has run out!\n");
        } else if (this.lightTime < 25) {
          this.out("Light runs out in " + this.lightTime + " turns!\n");
        }
      }
    }

    // Describe room if needed
    if (this.redraw) { this.look(); this.redraw = false; }

    // Auto actions
    this.runActions(0, 0);
    if (this.redraw) { this.look(); this.redraw = false; }

    if (!input) return this.flush();

    input = this.expand(input);
    const parts = input.toUpperCase().trim().split(/\s+/);
    let verbW = parts[0] || '', nounW = parts[1] || '';
    if (!verbW) return this.flush();

    let verb = this.findWord(verbW, this.g.verbs);
    let noun = nounW ? this.findWord(nounW, this.g.nouns) : 0;

    // Single direction word without GO
    if (verb === -1 && !nounW) {
      const n = this.findWord(verbW, this.g.nouns);
      if (n >= 1 && n <= 6) { verb = 1; noun = n; nounW = verbW; }
    }

    if (verb === -1) { this.out("I don't know what \"" + verbW + "\" means.\n"); return this.flush(); }
    if (nounW && noun === -1) { this.out("I don't know what \"" + nounW + "\" means.\n"); return this.flush(); }
    if (nounW) this.lastNoun = nounW;

    // Try action table first
    if (!this.runActions(verb, noun)) {
      // Built-in fallbacks
      if (verb === 1 && noun >= 1 && noun <= 6) this.doGo(noun - 1);
      else if (verb === 10) this.doGet(nounW);
      else if (verb === 18) this.doDrop(nounW);
      else this.out("I don't understand what you want me to do.\n");
    } else if (noun === 0 && !nounW) {
      // Some Scott Adams .dat files (e.g. Adventureland) encode INVENTORY with an opcode this engine maps to a no-op (case 66 = flag only). SCORE still uses the opcode that prints carrying here, so leave SCORE / expand() as-is; only ensure INVENTORY actually lists items.
      const invV = this.findWord('INVENTORY', this.g.verbs);
      if (invV >= 0 && verb === invV && !this.buf.includes("I'm carrying:")) this.exec(65, [], 0);
    }

    if (this.redraw) { this.look(); this.redraw = false; }
    return this.flush();
  }
}

/* ===== UI ===== */
const outputEl = document.getElementById('output');
const cmdEl = document.getElementById('cmd');
// room images now created inline inside outputEl
var engine = null;
var currentGameId = 'adv01';

/** Absolute URL for images — fixes SVG <image href> resolution; pairs with threaded local server when WebLLM loads big files. */
function resolveAssetUrl(relPath) {
  return new URL(relPath, window.location.href).href;
}

/* ===== MAP STATE ===== */
let mapVisited = new Set();
let mapEdges = new Map();       // roomNum -> Map<dirIndex, targetRoom>
let mapRoomDescs = new Map();   // roomNum -> description string

function recordMapState() {
  if (!engine) return;
  const room = engine.loc;
  mapVisited.add(room);

  // Record room description
  const rd = engine.g.rooms[room];
  if (rd && rd.desc) {
    let d = rd.desc;
    if (d.startsWith('*')) d = d.substring(1);
    mapRoomDescs.set(room, d);
  }

  // Record exits from current room
  if (rd) {
    if (!mapEdges.has(room)) mapEdges.set(room, new Map());
    const edges = mapEdges.get(room);
    for (let d = 0; d < 6; d++) {
      if (rd.exits[d]) edges.set(d, rd.exits[d]);
    }
  }
}

/* ===== MAP LAYOUT (BFS grid placement) ===== */
function computeMapLayout() {
  // Direction offsets: N=up, S=down, E=right, W=left, U=upper-left, D=lower-right
  const offsets = [
    {dx:0, dy:-1},  // 0=North
    {dx:0, dy:1},   // 1=South
    {dx:1, dy:0},   // 2=East
    {dx:-1, dy:0},  // 3=West
    {dx:-1, dy:-1}, // 4=Up
    {dx:1, dy:1}    // 5=Down
  ];

  const gridPos = new Map();  // roomNum -> {x, y}
  const occupied = new Map(); // "x,y" -> roomNum

  if (mapVisited.size === 0) return gridPos;

  // Find the start room (lowest visited room or engine start)
  const startRoom = engine ? engine.h.startRoom : mapVisited.values().next().value;
  if (!mapVisited.has(startRoom)) {
    // Use first visited room
    const first = mapVisited.values().next().value;
    gridPos.set(first, {x:0, y:0});
    occupied.set('0,0', first);
  } else {
    gridPos.set(startRoom, {x:0, y:0});
    occupied.set('0,0', startRoom);
  }

  // BFS to place rooms
  const queue = [gridPos.keys().next().value];
  const visited = new Set(queue);

  while (queue.length > 0) {
    const room = queue.shift();
    const pos = gridPos.get(room);
    const edges = mapEdges.get(room);
    if (!edges) continue;

    for (const [dir, target] of edges) {
      if (!mapVisited.has(target) || gridPos.has(target)) continue;

      const off = offsets[dir];
      let tx = pos.x + off.dx;
      let ty = pos.y + off.dy;

      // If cell occupied, spiral outward to find free cell
      if (occupied.has(tx + ',' + ty) && occupied.get(tx + ',' + ty) !== target) {
        let found = false;
        for (let radius = 1; radius <= 10 && !found; radius++) {
          for (let dx = -radius; dx <= radius && !found; dx++) {
            for (let dy = -radius; dy <= radius && !found; dy++) {
              if (Math.abs(dx) !== radius && Math.abs(dy) !== radius) continue;
              const cx = pos.x + off.dx + dx;
              const cy = pos.y + off.dy + dy;
              if (!occupied.has(cx + ',' + cy)) {
                tx = cx; ty = cy; found = true;
              }
            }
          }
        }
      }

      gridPos.set(target, {x: tx, y: ty});
      occupied.set(tx + ',' + ty, target);

      if (!visited.has(target)) {
        visited.add(target);
        queue.push(target);
      }
    }
  }

  return gridPos;
}

/* ===== MAP SHOW/HIDE ===== */
function showMap() {
  if (!engine) return;
  // Show inline map in the output area
  showInlineMap();
  outputEl.scrollTop = outputEl.scrollHeight;
}

function hideMap() {
  // no-op now (inline map is part of output flow)
  cmdEl.focus();
}

/* ===== MAP SAVE/LOAD ===== */
function saveMapState() {
  if (!engine) return;
  const key = 'sa_map_' + (engine.g.advNum || 0);
  const data = {
    visited: [...mapVisited],
    edges: [...mapEdges.entries()].map(([k, v]) => [k, [...v.entries()]]),
    descs: [...mapRoomDescs.entries()]
  };
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

function loadMapState() {
  if (!engine) return;
  const key = 'sa_map_' + (engine.g.advNum || 0);
  try {
    const d = localStorage.getItem(key);
    if (!d) return;
    const s = JSON.parse(d);
    mapVisited = new Set(s.visited);
    mapEdges = new Map(s.edges.map(([k, v]) => [k, new Map(v)]));
    mapRoomDescs = new Map(s.descs);
  } catch(e) {
    mapVisited = new Set();
    mapEdges = new Map();
    mapRoomDescs = new Map();
  }
}

function clearMapState() {
  mapVisited = new Set();
  mapEdges = new Map();
  mapRoomDescs = new Map();
}

/* ===== UI FUNCTIONS ===== */
function appendOut(text) {
  // Highlight treasures
  text = text.replace(/\*([^*]+)\*/g, '<span class="treasure">*$1*</span>');
  const div = document.createElement('div');
  div.innerHTML = text.replace(/\n/g, '<br>');
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function clearOut() { outputEl.innerHTML = ''; }

function showRoomImg(num) {
  // Remove previous room image and map (only latest visible)
  outputEl.querySelectorAll('.room-img, .inline-map').forEach(el => el.remove());
  const pad = String(num).padStart(2, '0');
  const url = resolveAssetUrl('images/' + currentGameId + '/room_' + pad + '.png');
  const img = document.createElement('img');
  img.className = 'room-img';
  img.src = url;
  img.style.cssText = 'max-width:400px;max-height:250px;margin:2px 0 0;border:1px solid #0f3460;border-radius:4px;display:block';
  img.onerror = function() { this.remove(); };
  outputEl.appendChild(img);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function showInlineMap() {
  // Remove previous image and map — map replaces image
  outputEl.querySelectorAll('.room-img, .inline-map').forEach(el => el.remove());
  if (!engine || mapVisited.size === 0) return;
  const mapDiv = document.createElement('div');
  mapDiv.className = 'inline-map';
  mapDiv.style.cssText = 'max-width:600px;overflow:auto;max-height:300px;margin:2px 0 4px';
  mapDiv.innerHTML = buildMapSvg();
  outputEl.appendChild(mapDiv);
}

function buildMapSvg() {
  const layout = computeMapLayout();
  if (layout.size === 0) return '';

  const cellW = 76, cellH = 52, padX = 20, padY = 16, thumbW = 60, thumbH = 38;
  const dirLabels = ['N','S','E','W','U','D'];
  const offsets = [{dx:0,dy:-1},{dx:0,dy:1},{dx:1,dy:0},{dx:-1,dy:0},{dx:-1,dy:-1},{dx:1,dy:1}];

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const pos of layout.values()) {
    if (pos.x < minX) minX = pos.x;
    if (pos.x > maxX) maxX = pos.x;
    if (pos.y < minY) minY = pos.y;
    if (pos.y > maxY) maxY = pos.y;
  }

  const svgW = (maxX - minX + 1) * cellW + padX * 2;
  const svgH = (maxY - minY + 1) * cellH + padY * 2;

  function toSvg(gx, gy) {
    return { sx: (gx - minX) * cellW + padX + cellW/2, sy: (gy - minY) * cellH + padY + cellH/2 };
  }

  let svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + svgW + '" height="' + svgH + '" style="display:block;margin:auto">';

  // Lines
  for (const [room, pos] of layout) {
    const edges = mapEdges.get(room);
    if (!edges) continue;
    const from = toSvg(pos.x, pos.y);
    for (const [dir, target] of edges) {
      const isUD = dir >= 4;
      const tp = layout.get(target);
      if (tp) {
        const to = toSvg(tp.x, tp.y);
        const stroke = isUD ? '#334' : '#0f3460';
        const dash = isUD ? ' stroke-dasharray="4,3"' : '';
        svg += '<line x1="'+from.sx+'" y1="'+from.sy+'" x2="'+to.sx+'" y2="'+to.sy+'" stroke="'+stroke+'" stroke-width="1.5"'+dash+'/>';
      } else if (!mapVisited.has(target)) {
        const off = offsets[dir];
        svg += '<line x1="'+from.sx+'" y1="'+from.sy+'" x2="'+(from.sx+off.dx*30)+'" y2="'+(from.sy+off.dy*22)+'" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>';
        svg += '<text x="'+(from.sx+off.dx*30)+'" y="'+(from.sy+off.dy*22+4)+'" text-anchor="middle" fill="#555" font-size="10" font-family="monospace">?</text>';
      }
    }
  }

  // Rooms
  const curRoom = engine ? engine.loc : -1;
  for (const [room, pos] of layout) {
    const p = toSvg(pos.x, pos.y);
    const rx = p.sx - thumbW/2, ry = p.sy - thumbH/2;
    const isCur = room === curRoom;
    const bc = isCur ? '#e94560' : '#0f3460';
    const bw = isCur ? 2 : 1;
    const bg = isCur ? '#1a1a3e' : '#111122';
    svg += '<rect x="'+rx+'" y="'+ry+'" width="'+thumbW+'" height="'+thumbH+'" fill="'+bg+'" stroke="'+bc+'" stroke-width="'+bw+'" rx="3"/>';
    const pad2 = String(room).padStart(2, '0');
    const thumbSrc = resolveAssetUrl('images/' + currentGameId + '/room_' + pad2 + '.png');
    svg += '<image href="' + thumbSrc + '" x="'+(rx+2)+'" y="'+(ry+2)+'" width="'+(thumbW-4)+'" height="'+(thumbH-12)+'" preserveAspectRatio="xMidYMid slice"/>';
    const lc = isCur ? '#e94560' : '#00ff41';
    svg += '<text x="'+p.sx+'" y="'+(ry+thumbH-2)+'" text-anchor="middle" fill="'+lc+'" font-size="9" font-family="monospace">'+room+'</text>';
  }

  svg += '</svg>';
  return svg;
}

async function newGame() {
  const file = document.getElementById('game-select').value;
  currentGameId = file.replace('.dat', '');
  try {
    var text;
    try {
      var resp = await fetch('Game_Data/' + file);
      if (!resp.ok) throw new Error('fetch failed');
      text = await resp.text();
    } catch(fetchErr) {
      // Fallback: XHR works on file:// in Safari and some browsers
      text = await new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'Game_Data/' + file);
        xhr.onload = function() { resolve(xhr.responseText); };
        xhr.onerror = function() { reject(new Error('Could not load ' + file)); };
        xhr.send();
      });
    }
    if (!text || text.length < 10) throw new Error('Empty or missing file');
    var game = parseGameData(text);
    engine = new Engine(game);
    clearMapState();
    clearOut();
    var out = engine.turn('');
    appendOut(out);
    showRoomImg(engine.roomNum);
    recordMapState();
    cmdEl.focus();
  } catch(e) {
    clearOut();
    appendOut('Error loading game: ' + e.message + '\nMake sure game .dat files are in the Game_Data folder.\n\n' +
      'If opened from a local file, try:\n' +
      '  python3 scripts/serve-threaded.py 8090   (threaded; use with LLM)\n' +
      '  or: python3 -m http.server 8090\n' +
      '  then open http://localhost:8090\n\n' +
      'Or play online:\n' +
      '  https://jmrothberg.github.io/scott-adams-adventures/');
  }
}

function handleCmd() {
  if (!engine) return;
  const cmd = cmdEl.value.trim();
  cmdEl.value = '';
  if (!cmd) return;

  appendOut('<span style="color:#e94560">&gt; ' + cmd.toUpperCase() + '</span>');

  const upper = cmd.toUpperCase();

  // Intercept MAP command
  if (upper === 'MAP' || upper === 'SHOW MAP' || upper === 'M') {
    showMap();
    return;
  }

  if (upper === 'QUIT' || upper === 'Q') {
    appendOut('Thanks for playing!\n');
    engine.deathReason = 'You quit (QUIT).';
    engine.dead = true;
    appendOut('Why you ended: You quit (QUIT).\n');
    return;
  }
  if (upper === 'LOAD' || upper === 'RESTORE') {
    engine.doLoad();
    appendOut(engine.flush());
    loadMapState();
    recordMapState();
    showRoomImg(engine.roomNum);
    return;
  }

  const out = engine.turn(cmd);
  appendOut(out);
  recordMapState();
  showRoomImg(engine.roomNum);
}

function saveGame() {
  if (!engine) return;
  engine.doSave();
  saveMapState();
  appendOut(engine.flush());
}

function loadGame() {
  if (!engine) return;
  engine.doLoad();
  loadMapState();
  recordMapState();
  appendOut(engine.flush());
  showRoomImg(engine.roomNum);
}

cmdEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleCmd(); });

// Command history
let cmdHistory = [], histIdx = -1;
cmdEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && cmdEl.value.trim()) {
    cmdHistory.push(cmdEl.value.trim());
    histIdx = cmdHistory.length;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; cmdEl.value = cmdHistory[histIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; cmdEl.value = cmdHistory[histIdx]; }
    else { histIdx = cmdHistory.length; cmdEl.value = ''; }
  }
});

// Hide LLM toggle on file:// (ES module won't load)
if (location.protocol === 'file:') {
  var llmToggle = document.getElementById('llm-toggle');
  if (llmToggle) llmToggle.style.display = 'none';
  var llmModel = document.getElementById('llm-model');
  if (llmModel) llmModel.style.display = 'none';
}

// Always try to start — error handler will show help if fetch fails
newGame();
